name: Run Scraper

# Runs Valeria's news scraper on a schedule and writes articles to Supabase.
# Coexists with whatever scraper instance Valeria runs on Render — both write
# via upsert with UNIQUE constraints, so duplicates are silently ignored.

on:
  schedule:
    - cron: '0 6,18 * * *'   # 06:00 and 18:00 UTC (08:00 and 20:00 Berlin summer time)
  workflow_dispatch:           # allow manual trigger from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Run scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scraper_UPDATED.py
